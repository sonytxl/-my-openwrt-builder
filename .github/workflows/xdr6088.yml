name: Build ImmortalWrt MT7986 (XDR6088 Minimal Stable)

on:
  workflow_dispatch:

env:
  OPENWRT_SOURCE: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  OPENWRT_BRANCH: "2410"
  DEVICE: tplink_tl-xdr6088
  FIRMWARE_NAME: immortalwrt-mt7986-xdr6088

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Init Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-pip unzip zlib1g-dev file wget rsync

      - name: 3. Clone Source
        run: |
          git clone --depth 1 -b $OPENWRT_BRANCH $OPENWRT_SOURCE immortalwrt

      - name: 4. Update Feeds (干净环境)
        run: |
          cd immortalwrt
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 5. Generate Minimal Config（关键步骤）
        run: |
          cd immortalwrt

          # 生成默认配置
          make defconfig

          # 用 scripts/config 修改（不要手写 .config！）
          ./scripts/config --set-val CONFIG_TARGET mediatek
          ./scripts/config --set-val CONFIG_TARGET_SUBTARGET filogic
          ./scripts/config --set-val CONFIG_TARGET_PROFILE tplink_tl-xdr6088

          # LuCI（基础）
          ./scripts/config --enable CONFIG_PACKAGE_luci

          # 🔥 HNAT（只开这个，别动底层）
          ./scripts/config --enable CONFIG_PACKAGE_kmod-mtk-hnat

          # ⚠️ 不要手动开 wed / dma / kernel 参数
          # 让系统自动补依赖

          # 重新生成依赖
          make defconfig

      - name: 6. Add Swap（防止编译炸）
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 7. Compile
        run: |
          cd immortalwrt
          make -j2 || make -j1 V=s

      - name: 8. Package
        run: |
          cd immortalwrt/bin/targets/mediatek/filogic
          rm -rf packages
          DATE=$(date +%Y%m%d)
          mv *tplink_tl-xdr6088*.bin ../../${{ env.FIRMWARE_NAME }}-$DATE.bin

      - name: 9. Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: immortalwrt/bin/*.bin
